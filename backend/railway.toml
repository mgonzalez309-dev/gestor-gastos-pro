[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npx prisma generate --schema=./prisma/schema.prisma && npm run build && npx prisma migrate deploy --schema=./prisma/schema.prisma"

[deploy]
startCommand = "npm run start:prod"
healthcheckPath = "/docs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
