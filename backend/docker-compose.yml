services:
  db:
    image: postgres:16-alpine
    container_name: gastosapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gastos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gastos_db"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
